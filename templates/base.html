<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Expense Eye{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  {% block head %}{% endblock %}
</head>
<body>
  <!-- NAV -->
  <nav class="navbar" id="navbar">
    <div class="nav-container">
      <a href="/" class="nav-brand">
        <div class="brand-icon">E</div>
        <span>Expense Eye</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="/dashboard" class="nav-link" data-auth="true">Dashboard</a></li>
        <li><a href="/upload"    class="nav-link" data-auth="true">Upload</a></li>
        <li><a href="/receipts"  class="nav-link" data-auth="true">Receipts</a></li>
        <li><span class="user-name" id="user-name" data-auth="true" style="display:none"></span></li>
        <li class="profile-menu" data-auth="true" style="display:none">
          <button class="profile-btn" id="profile-btn" aria-label="Profile">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </button>
          <div class="profile-dropdown" id="profile-dropdown">
            <div class="profile-header">
              <div class="profile-avatar">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                  <circle cx="12" cy="7" r="4"></circle>
                </svg>
              </div>
              <div class="profile-info">
                <div class="profile-name" id="profile-name">User</div>
                <div class="profile-email" id="profile-email">user@example.com</div>
              </div>
            </div>
            <div class="profile-divider"></div>
            <button class="profile-menu-item" id="change-password-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
              Change Password
            </button>
            <button class="profile-menu-item" id="logout-dropdown-btn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              Logout
            </button>
          </div>
        </li>
        <li><a href="/login"     class="nav-link" data-guest="true">Login</a></li>
        <li><a href="/signup"    class="nav-link btn-nav" data-guest="true">Sign Up</a></li>
      </ul>
      <button class="hamburger" id="hamburger" aria-label="Toggle menu">&#9776;</button>
    </div>
  </nav>

  <!-- PAGE CONTENT -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <!-- CHANGE PASSWORD MODAL -->
  <div class="modal" id="password-modal">
    <div class="modal-overlay" id="password-modal-overlay"></div>
    <div class="modal-content">
      <div class="modal-header">
        <h3>Change Password</h3>
        <button class="modal-close" id="password-modal-close">&times;</button>
      </div>
      <form id="change-password-form">
        <div class="form-group">
          <label for="current-password">Current Password</label>
          <input type="password" id="current-password" class="form-control" required />
        </div>
        <div class="form-group">
          <label for="new-password">New Password</label>
          <input type="password" id="new-password" class="form-control" required minlength="6" />
        </div>
        <div class="form-group">
          <label for="confirm-new-password">Confirm New Password</label>
          <input type="password" id="confirm-new-password" class="form-control" required minlength="6" />
        </div>
        <div class="form-error" id="password-error"></div>
        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="password-cancel-btn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="password-submit-btn">
            <span class="btn-text">Change Password</span>
            <span class="btn-spinner hidden">●</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- TOAST NOTIFICATION -->
  <div class="toast" id="toast"></div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
